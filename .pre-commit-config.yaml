repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format
  - repo: https://github.com/pytest-dev/pytest
    rev: v8.3.2
    hooks:
      - id: pytest
        name: pytest (fast)
        entry: pytest -q
        language: system
        pass_filenames: false
        stages: [commit]