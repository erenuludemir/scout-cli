name: Build Multi-Arch V2 Image

on:
  workflow_dispatch:
    inputs:
      push:
        description: "Push image to registry (requires secrets)"
        required: false
        default: "false"
      provenance:
        description: "Enable provenance attestations (true/false)"
        required: false
        default: "false"
      sbom:
        description: "Generate and upload SBOM (true/false)"
        required: false
        default: "true"
  push:
    branches: [ main, master ]
    paths:
      - 'quantumai-usdt-v2/**'
      - '.github/workflows/build-multiarch.yml'

env:
  IMAGE_NAME: quantumai-usdt-v2
  PLATFORMS: linux/amd64,linux/arm64

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=ref,event=branch
            type=ref,event=tag

      - name: Login (Docker Hub) if secrets available
        if: ${{ secrets.DOCKERHUB_USERNAME && secrets.DOCKERHUB_TOKEN }}
        uses: docker/login-action@v3
        with:
            username: ${{ secrets.DOCKERHUB_USERNAME }}
            password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build (multi-arch)
        uses: docker/build-push-action@v5
        with:
          context: ./quantumai-usdt-v2
          file: ./quantumai-usdt-v2/Dockerfile
          platforms: ${{ env.PLATFORMS }}
          push: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.push == 'true') || (secrets.DOCKERHUB_USERNAME && secrets.DOCKERHUB_TOKEN) }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: ${{ github.event.inputs.provenance == 'true' }}
          sbom: false

      - name: Generate SBOM (syft)
        if: ${{ github.event.inputs.sbom == 'true' }}
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE_NAME }}:latest
          artifact-path: sbom-${{ env.IMAGE_NAME }}.spdx.json

      - name: Upload SBOM
        if: ${{ github.event.inputs.sbom == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ env.IMAGE_NAME }}
          path: sbom-${{ env.IMAGE_NAME }}.spdx.json

      - name: Summary
        run: |
          echo "Build complete." >> $GITHUB_STEP_SUMMARY
          echo "Tags: ${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "Provenance: ${{ github.event.inputs.provenance }}" >> $GITHUB_STEP_SUMMARY
          echo "SBOM generated: ${{ github.event.inputs.sbom }}" >> $GITHUB_STEP_SUMMARY

