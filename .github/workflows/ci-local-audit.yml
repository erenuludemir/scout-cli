name: ci-local-audit

on:
  push:
    branches:
      - '**'
  pull_request:
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-local-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: audit
    runs-on: [self-hosted, macOS, ARM64]
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Show runner context
        run: |
          uname -a
          sw_vers || true
          xcode-select -p || true
          docker version || true
          docker compose version || true
          python3 --version || true
          swift --version || true
      - name: Ensure audit script is executable
        run: chmod +x "$GITHUB_WORKSPACE/ops/qai_dependency_audit.sh"
      - name: Run audit
        env:
          CI: "true"
        run: make audit
      - name: Upload latest dependency audit log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-audit-logs
          path: |
            _logs/dependency_audit/*.log
            _logs/dependency_audit/*.txt
            _logs/dependency_audit/*.json
          if-no-files-found: warn
          retention-days: 14
