name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      VULN_STRICT: false  # set true to fail build on HIGH/CRITICAL vulns
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -c constraints.txt -r requirements-dev.txt

      - name: Lint (Ruff)
        run: ruff check .

      - name: Run tests (coverage)
        run: coverage run -m pytest -q && coverage xml

      - name: Coverage report
        run: coverage report -m || true

      - name: Upload coverage XML
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

      - name: Build docker (smoke)
        run: docker build -t qai-usdt ./usdt

      - name: Build v2 image (smoke)
        run: docker build -t quantumai-usdt-v2 ./quantumai-usdt-v2

      - name: Trivy scan (usdt)
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: qai-usdt:latest
          format: 'table'
          vuln-type: 'os,library'
          severity: 'HIGH,CRITICAL'
          exit-code: ${{ env.VULN_STRICT == 'true' && '1' || '0' }}

      - name: Trivy scan (v2)
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: quantumai-usdt-v2:latest
          format: 'table'
          vuln-type: 'os,library'
          severity: 'HIGH,CRITICAL'
          exit-code: ${{ env.VULN_STRICT == 'true' && '1' || '0' }}
