name: QuantumAI CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
    paths:
      - 'Dockerfile*'
      - 'compose*.yml'
      - 'docker-compose*.yml'
      - '*/Dockerfile'
      - 'pyproject.toml'
      - 'requirements*.txt'
      - '.github/workflows/ci.yml'
      - '**.py'
  pull_request:
    branches:
      - main
      - develop

env:
  REGISTRY: ghcr.io
  VULN_STRICT: false  # Set true to fail build on HIGH/CRITICAL vulns

jobs:
  # ===== STAGE 1: Lint & Validate =====
  validate:
    name: Lint & Validate
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest pylint black yamllint pyyaml

      - name: Lint Python files (ruff)
        run: ruff check . --select=E,W,F,N --ignore=E501
        continue-on-error: true

      - name: Type check (pylint)
        run: pylint **/*.py --disable=all --enable=E,F 2>/dev/null || true
        continue-on-error: true

      - name: Check Docker Compose syntax
        run: |
          docker-compose --file compose.yml --file docker-compose.base.yml config > /dev/null 2>&1 && echo "✅ Compose config valid" || echo "⚠️  Compose validation skipped"
        continue-on-error: true

  # ===== STAGE 2: Test =====
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
      packages: read

    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: qai
          POSTGRES_PASSWORD: qaipass
          POSTGRES_DB: qai_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -c constraints.txt -r requirements-dev.txt 2>/dev/null || pip install -r requirements.txt
        continue-on-error: true

      - name: Run unit tests (pytest)
        run: |
          coverage run -m pytest tests/ -v --tb=short 2>/dev/null || pytest tests/ -v --tb=short || true
        env:
          DATABASE_URL: postgresql://qai:qaipass@localhost:5432/qai_test
          REDIS_URL: redis://localhost:6379/0
        continue-on-error: true

      - name: Generate coverage report
        run: |
          coverage report -m || true
          coverage xml || true
        continue-on-error: true

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
        continue-on-error: true

  # ===== STAGE 3: Build Docker Images =====
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')

    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - service: usdt
            dockerfile: "./usdt/Dockerfile"

          - service: quantumai-usdt-v2
            dockerfile: "./quantumai-usdt-v2/Dockerfile"

          - service: dex
            dockerfile: "./dex/Dockerfile"

          - service: gateway
            dockerfile: "./gateway/Dockerfile"

          - service: rosettaai
            dockerfile: "./orchestrator/components/RossettaAI/Dockerfile"

          - service: metrics
            dockerfile: "./orchestrator/metrics/Dockerfile"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Smoke build - ${{ matrix.service }}
        run: docker build -t qai-${{ matrix.service }}:smoke -f ${{ matrix.dockerfile }} .
        continue-on-error: true

  # ===== STAGE 4: Security Scanning =====
  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    needs: build-images
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install security tools
        run: |
          pip install bandit safety

      - name: Bandit - Code security check
        run: |
          bandit -r . -f json -o bandit-report.json || true
          cat bandit-report.json || true
        continue-on-error: true

      - name: Safety - Dependency vulnerability check
        run: |
          safety check --json || true
        continue-on-error: true

      - name: Trivy - Filesystem scan (usdt)
        uses: aquasecurity/trivy-action@0.20.0
        with:
          scan-type: 'fs'
          scan-ref: './usdt'
          format: 'sarif'
          output: 'trivy-usdt.sarif'
        continue-on-error: true

      - name: Trivy - Filesystem scan (usdt-v2)
        uses: aquasecurity/trivy-action@0.20.0
        with:
          scan-type: 'fs'
          scan-ref: './quantumai-usdt-v2'
          format: 'sarif'
          output: 'trivy-usdt-v2.sarif'
        continue-on-error: true

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-usdt.sarif'
        continue-on-error: true

  # ===== STAGE 5: Report =====
  report:
    name: Test Report
    runs-on: ubuntu-latest
    needs: [validate, test, security-scan]
    if: always()

    steps:
      - name: Job Status Summary
        run: |
          echo "## ✅ CI/CD Pipeline Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Pipeline Status" >> $GITHUB_STEP_SUMMARY
          echo "- Validation: ${{ needs.validate.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Tests: ${{ needs.test.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Security Scan: ${{ needs.security-scan.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "- View detailed logs in Actions tab" >> $GITHUB_STEP_SUMMARY
          echo "- Review security findings" >> $GITHUB_STEP_SUMMARY
          echo "- Merge to main if all checks pass" >> $GITHUB_STEP_SUMMARY
        with:
          image-ref: qai-usdt:latest
          format: 'table'
          vuln-type: 'os,library'
          severity: 'HIGH,CRITICAL'
          exit-code: ${{ env.VULN_STRICT == 'true' && '1' || '0' }}

      - name: Trivy scan (v2)
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: quantumai-usdt-v2:latest
          format: 'table'
          vuln-type: 'os,library'
          severity: 'HIGH,CRITICAL'
          exit-code: ${{ env.VULN_STRICT == 'true' && '1' || '0' }}
