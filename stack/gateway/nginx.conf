worker_processes 1;
events{worker_connections 1024;}
http{
  server{
    listen 8080;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    location / { proxy_pass http://gli:5002; }
    location /dex/ { rewrite ^/dex/?(.*)$ /$1 break; proxy_pass http://dex:8000; }
    location = /health { proxy_pass http://gli:5002/health; }
  }
}
