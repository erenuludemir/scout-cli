version: "3.9"
services:
  gli:
    image: erenuludemir/gli-app:fixed
    container_name: gli
    env_file: ../.env
    restart: unless-stopped
    labels:
      - autoheal=true
      - com.centurylinklabs.watchtower.enable=true
    healthcheck:
      test: ["CMD-SHELL","curl -fsS http://127.0.0.1:5002/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 4s
      start_period: 10s
      retries: 3
    expose: ["5002"]
  dex:
    build: { context: ./dex }
    container_name: dex
    env_file: ../.env
    restart: unless-stopped
    labels:
      - autoheal=true
      - com.centurylinklabs.watchtower.enable=true
    depends_on:
      gli: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL","curl -fsS http://127.0.0.1:8000/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 4s
      start_period: 10s
      retries: 3
    expose: ["8000"]
  gateway:
    build: { context: ./gateway }
    container_name: gateway
    restart: unless-stopped
    labels:
      - autoheal=true
      - com.centurylinklabs.watchtower.enable=true
    depends_on:
      gli: { condition: service_healthy }
      dex: { condition: service_healthy }
    ports: ["5003:8080"]
    healthcheck:
      test: ["CMD-SHELL","curl -fsS http://127.0.0.1:8080/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 4s
      start_period: 10s
      retries: 3
  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: unless-stopped
    command: ["--label-enable","--cleanup","--interval","60"]
    volumes: ["/var/run/docker.sock:/var/run/docker.sock"]
  autoheal:
    image: willfarrell/autoheal
    container_name: autoheal
    restart: unless-stopped
    environment: ["AUTOHEAL_INTERVAL=30","AUTOHEAL_START_PERIOD=120","AUTOHEAL_CONTAINER_LABEL=all"]
    volumes: ["/var/run/docker.sock:/var/run/docker.sock"]
