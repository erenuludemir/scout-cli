worker_processes 1;
events { worker_connections 1024; }
http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" "$http_user_agent"';
  access_log /var/log/nginx/access.log main;
  access_log /dev/stdout main;
  error_log /var/log/nginx/error.log warn;
  error_log /dev/stderr warn;
  upstream dex_upstream { server dex:8080; }
  upstream usdt_upstream { server quantumai-usdt:8000; }
  server {
    listen 8080;
    location = /health {
      access_log off;
      add_header Content-Type application/json;
      return 200 '{"ok":true,"block":23230071}';
    }
    location /dex/ {
      proxy_pass http://dex_upstream/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /usdt/ {
      proxy_pass http://usdt_upstream/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
    location / {
      proxy_pass http://dex_upstream/health;
      proxy_set_header Host $host;
    }
  }
}
