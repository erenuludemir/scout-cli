services:
  dex:
    build:
      context: ./dex
      dockerfile: Dockerfile
    image: quantumai-dockerized-system-dex:latest
    volumes:
    - dex_logs:/var/log/qai
    expose:
    - '8080'
    healthcheck:
      test:
      - CMD-SHELL
      - curl -fsS http://127.0.0.1:8080/health || exit 1
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped
  quantumai-usdt:
    build: ./usdt
    image: quantumai-dockerized-system-quantumai-usdt:latest
    volumes:
    - quantumai_usdt_logs:/var/log/qai
    env_file:
    - .env
    - .env.local
    environment:
    - GLI_DRY_RUN=${GLI_DRY_RUN:-1}
    expose:
    - '8000'
    healthcheck:
      test:
      - CMD-SHELL
      - curl -fsS http://127.0.0.1:8000/health || curl -fsS http://127.0.0.1:8000/
        || exit 1
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: unless-stopped
  gateway:
    build: ./gateway
    image: quantumai-dockerized-system-gateway:latest
    volumes:
    - gateway_file_logs:/var/log/nginx
    depends_on:
      dex:
        condition: service_healthy
      quantumai-usdt:
        condition: service_healthy
    ports:
    - 5003:8080
    healthcheck:
      test:
      - CMD-SHELL
      - curl -fsS http://127.0.0.1:8080/health || exit 1
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 3s
    restart: unless-stopped

volumes:
  dex_logs:
  quantumai_usdt_logs:
  gateway_file_logs:
