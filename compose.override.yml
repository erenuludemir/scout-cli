services:
  dex:
    healthcheck:
      test:
        - CMD-SHELL
        - curl -fsS http://localhost:8080/health || exit 1
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  quantumai-usdt:
    healthcheck:
      test:
        - CMD-SHELL
        - curl -fsS http://localhost:8000/health || exit 1
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  gateway:
    restart: unless-stopped
