services:
  quantumai-usdt:
    build:
      context: ./quantumai-usdt
    container_name: quantumai-usdt
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - ./quantumai-usdt/.env
    environment:
      - GLI_DRY_RUN=0
    healthcheck:
      test: ["CMD-SHELL","curl -fsS http://127.0.0.1:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 8
