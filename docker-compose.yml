version: "3.8"
services:
  quantumai-usdt:
    build: .
    ports:
      - "5003:5002"
    env_file:
      - .env
    restart: always
    container_name: quantumai-usdt
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5002/health"]
      interval: 30s
      timeout: 10s
      retries: 5
